# ======================================================================
# Override DEV LOKAL — membuka port service internal ke 127.0.0.1 saja
# (akses psql / influx UI / grafana admin / backend langsung dari host).
#
# JANGAN dipakai di server (bisa bentrok port di VM yang dipakai banyak app,
# dan tidak perlu karena akses lewat proxy frontend).
#
# Dipakai otomatis oleh `./run.sh up` (dev). `./run.sh deploy` TIDAK memakainya.
# Manual:  docker compose -f docker-compose.yml -f docker-compose.debug.yml up -d
# ======================================================================

services:
  # Catatan: WebSocket mosquitto (9001) sudah dipublish di base compose
  # (untuk Cloudflare Tunnel), jadi tidak diulang di sini.
  influxdb:
    ports:
      - "127.0.0.1:${INFLUX_PORT:-8086}:8086"

  postgres:
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"

  grafana:
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"

  backend:
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5000}:5000"
