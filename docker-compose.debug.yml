# ======================================================================
# Override DEV LOKAL — membuka port service internal ke 127.0.0.1 saja
# (akses psql / influx UI / grafana admin / backend langsung dari host).
#
# JANGAN dipakai di server (bisa bentrok port di VM yang dipakai banyak app,
# dan tidak perlu karena akses lewat proxy frontend).
#
# Dipakai otomatis oleh `./run.sh up` (dev) & `demo`. `deploy` TIDAK memakainya.
# Manual:  docker compose -f docker-compose.yml -f docker-compose.debug.yml up -d
#
# CATATAN WINDOWS: host port di-set AUTO ("127.0.0.1::<port>") supaya Docker
# memilih port host yang BEBAS. Ini menghindari error
#   "bind: An attempt was made to access a socket in a way forbidden..."
# yang terjadi bila port (mis. 5432) masuk rentang yang direservasi Windows
# (WinNAT/Hyper-V). Lihat port host yang dipakai dengan:  docker ps
# (kolom PORTS, mis. 127.0.0.1:5xxxx->5432/tcp).
# ======================================================================

services:
  # Catatan: WebSocket mosquitto (9001) sudah dipublish di base compose
  # (untuk Cloudflare Tunnel), jadi tidak diulang di sini.
  influxdb:
    ports:
      - "127.0.0.1::8086"

  postgres:
    ports:
      - "127.0.0.1::5432"

  grafana:
    ports:
      - "127.0.0.1::3000"

  backend:
    ports:
      - "127.0.0.1::5000"
