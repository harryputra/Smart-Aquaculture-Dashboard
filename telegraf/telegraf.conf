# Telegraf Configuration - Smart Aquaculture
# Mengambil data dari MQTT Mosquitto dan mengirim ke InfluxDB & PostgreSQL

[global_tags]
  project = "smart_aquaculture"

[agent]
  interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

# ============================
# INPUT: MQTT Consumer
# ============================
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "aquaculture/+/+/sensors",
    "aquaculture/+/+/status"
  ]
  qos = 0
  connection_timeout = "30s"
  
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"

  client_id = "telegraf_aquaculture"
  
  data_format = "json"
  json_string_fields = ["farm_id", "pond_id"]
  json_time_key = ""
  
  name_override = "sensor_data"

# ============================
# OUTPUT: InfluxDB v2
# ============================
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"

# ============================
# OUTPUT: PostgreSQL
# ============================
[[outputs.postgresql]]
  connection = "host=postgres user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} sslmode=disable"
  
  # Tabel untuk metrik sensor
  schema = "public"
  
  # Buat tabel otomatis
  create_templates = [
    '''CREATE TABLE {{ .table }} ({{ .columns }})'''
  ]
  
  add_column_templates = [
    '''ALTER TABLE {{ .table }} ADD COLUMN IF NOT EXISTS {{ .columns|join ", ADD COLUMN IF NOT EXISTS " }}'''
  ]
  
  tags_as_jsonb = ["tags"]
  fields_as_jsonb = []

# ============================
# OUTPUT: File (untuk debug)
# ============================
[[outputs.file]]
  files = ["stdout"]
  data_format = "influx"
