# Broker MQTT Smart Aquaculture (VPS) — TLS only
# File passwd & sertifikat dibuat oleh run.sh (lihat folder ini).

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type warning
log_type notice
log_type information
connection_messages true

# Wajib autentikasi (tidak ada akses anonim)
allow_anonymous false
password_file /mosquitto/config/passwd

# Listener MQTT over TLS (port 8883)
listener 8883
protocol mqtt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
# One-way TLS: client memverifikasi server; server tidak meminta cert client.
tls_version tlsv1.2
