# ======================================================================
# Smart Aquaculture — disesuaikan untuk server lab trin (docker-host VM)
# ----------------------------------------------------------------------
# - Semua secret dibaca dari .env (lihat .env.example). Default aman untuk
#   LOKAL, WAJIB diganti sebelum deploy ke server.
# - PRODUKSI (file ini saja): HANYA frontend (WEB_PORT) + MQTT (1883) yang
#   dipublikasikan ke host. Postgres/InfluxDB/Grafana/backend TIDAK di-publish
#   ke host (diakses lewat jaringan docker internal / proxy nginx) → tidak
#   bentrok port di VM yang dipakai banyak app, dan DB tak terekspos.
# - DEV LOKAL: pakai override docker-compose.debug.yml untuk membuka port
#   internal ke 127.0.0.1 (psql/influx/grafana admin dari host). run.sh `up`
#   memakainya otomatis; `deploy` memakai file ini saja.
# - MQTT 1883 di 0.0.0.0 agar ESP32 di LAN bisa konek (buka di UFW).
# - Memory limit dipasang per-service karena VM hanya 4 GB RAM (dibagi app lain).
# ======================================================================

services:
  # ============================
  # MQTT Broker - Mosquitto
  # ============================
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: aquaculture_mosquitto
    restart: unless-stopped
    ports:
      # 1883 perlu diakses ESP32 di LAN → bind ke semua interface (default).
      - "${MQTT_BIND:-0.0.0.0}:${MQTT_PORT:-1883}:1883"
      # WebSocket 9001 → dipublish ke 127.0.0.1 agar Cloudflare Tunnel bisa
      # meneruskannya sebagai wss://mqtt.<domain> (MQTT over WebSocket Secure).
      # ESP32 remote konek lewat sini (port 443 publik). Lihat docs/MQTT-WEBSOCKET-ESP32.md.
      - "${MQTT_WS_BIND:-127.0.0.1}:${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - aquaculture_net
    deploy:
      resources:
        limits:
          memory: 96M

  # ============================
  # InfluxDB - Time Series Database
  # ============================
  influxdb:
    image: influxdb:2.7
    container_name: aquaculture_influxdb
    restart: unless-stopped
    # Port host hanya dibuka di dev (docker-compose.debug.yml).
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_ADMIN_PASSWORD:-admin123456}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-aquaculture}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-sensor_data}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN:-my-super-secret-auth-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - aquaculture_net
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================
  # PostgreSQL - Relational Database
  # ============================
  postgres:
    image: postgres:15
    container_name: aquaculture_postgres
    restart: unless-stopped
    # Port host hanya dibuka di dev (docker-compose.debug.yml). Di produksi DB
    # diakses backend lewat jaringan docker internal saja (tidak terekspos).
    environment:
      - POSTGRES_USER=${DB_USER:-aquaculture}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-aquaculture123}
      - POSTGRES_DB=${DB_NAME:-aquaculture}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aquaculture} -d ${DB_NAME:-aquaculture}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - aquaculture_net
    deploy:
      resources:
        limits:
          memory: 384M

  # ============================
  # Telegraf - Data Collector
  # ============================
  telegraf:
    image: telegraf:1.28
    container_name: aquaculture_telegraf
    restart: unless-stopped
    depends_on:
      - mosquitto
      - influxdb
      - postgres
    environment:
      # Diinterpolasi ke dalam telegraf.conf (${VAR}) saat runtime.
      - MQTT_USER=${MQTT_USER:-aquaculture}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-aquaculture123}
      - INFLUX_TOKEN=${INFLUX_TOKEN:-my-super-secret-auth-token}
      - INFLUX_ORG=${INFLUX_ORG:-aquaculture}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-sensor_data}
      - DB_USER=${DB_USER:-aquaculture}
      - DB_PASSWORD=${DB_PASSWORD:-aquaculture123}
      - DB_NAME=${DB_NAME:-aquaculture}
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks:
      - aquaculture_net
    deploy:
      resources:
        limits:
          memory: 192M

  # ============================
  # Grafana - Visualization
  # ============================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: aquaculture_grafana
    restart: unless-stopped
    # Diakses via frontend proxy /grafana/. Port host langsung hanya di dev.
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false

      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
>>>>>>> upstream/main
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - influxdb
    networks:
      - aquaculture_net
    deploy:
      resources:
        limits:
          memory: 384M

  # ============================
  # Backend API - Node.js
  # ============================
  backend:
    build: ./backend
    container_name: aquaculture_backend
    restart: unless-stopped
    # Diakses via frontend proxy /api. Port host langsung hanya di dev.
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432

      - DB_USER=aquaculture
      - DB_PASSWORD=aquaculture123
      - DB_NAME=aquaculture
      - MQTT_PROTOCOL=wss
      - MQTT_HOST=mqtt.trin-polman.id
      - MQTT_PORT=443
      - MQTT_PATH=/
      - MQTT_USER=aquaculture
      - MQTT_PASSWORD=aquaculture123
>>>>>>> upstream/main
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN:-my-super-secret-auth-token}
      - INFLUX_ORG=${INFLUX_ORG:-aquaculture}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-sensor_data}
      # Broker remote khusus device lele (VPS via TLS). Kosongkan untuk pakai
      # broker lokal (mosquitto) seperti biasa. Lihat .env.example & vps-broker/.
      - LELE_MQTT_HOST=${LELE_MQTT_HOST:-}
      - LELE_MQTT_PORT=${LELE_MQTT_PORT:-8883}
      - LELE_MQTT_PROTOCOL=${LELE_MQTT_PROTOCOL:-mqtts}
      - LELE_MQTT_USER=${LELE_MQTT_USER:-}
      - LELE_MQTT_PASSWORD=${LELE_MQTT_PASSWORD:-}
      - LELE_MQTT_TLS_INSECURE=${LELE_MQTT_TLS_INSECURE:-false}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - postgres
      - mosquitto
      - influxdb
    networks:
      - aquaculture_net
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================
  # Frontend - React (di-publish via Cloudflare Tunnel)
  # ============================
  frontend:
    build: ./frontend
    container_name: aquaculture_frontend
    restart: unless-stopped
    ports:
      # Hanya service ini yang dipublikasikan. Di server: Cloudflare Tunnel
      # → http://localhost:${WEB_PORT}. Bind 127.0.0.1 supaya tak terbuka langsung.
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - aquaculture_net
    deploy:
      resources:
        limits:
          memory: 96M

networks:
  aquaculture_net:
    driver: bridge

volumes:
  influxdb_data:
  influxdb_config:
  postgres_data:
  grafana_data:
