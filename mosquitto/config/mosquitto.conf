# Konfigurasi Mosquitto MQTT Broker
# Smart Aquaculture System

# Listener untuk MQTT standar
listener 1883
protocol mqtt

# Listener untuk WebSocket (untuk akses dari browser jika diperlukan)
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Authentication
allow_anonymous false
password_file /mosquitto/config/passwd

# Auto save
autosave_interval 60
